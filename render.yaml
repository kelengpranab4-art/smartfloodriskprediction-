services:
  # ── BACKEND (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: flood-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free

  # ── FRONTEND (React) ───────────────────────────────────────────────────────
  - type: web
    name: flood-frontend
    env: docker
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
    plan: free
    buildArgs:
      - key: VITE_API_URL
        generateValue: false
        # After first deploy, get the flood-backend URL from Render and set
        # this env var manually: https://<flood-backend>.onrender.com
