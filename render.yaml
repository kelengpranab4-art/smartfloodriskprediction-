services:
  # ── Unified Guwahati Flood System (FastAPI + React) ─────────────────────────
  - type: web
    name: guwahati-flood-system
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false # Set this manually in Render dashboard
      - key: XAI_API_KEY
        sync: false
