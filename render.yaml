services:
  # ── BACKEND (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: flood-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free

  # ── FRONTEND (React) ───────────────────────────────────────────────────────
  - type: web
    name: flood-frontend
    env: docker
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://flood-backend.onrender.com
